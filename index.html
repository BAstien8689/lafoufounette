<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Foufounette - Loveroom</title>
<link rel="icon" href="favico.png?v=2">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #000, #5a0f2e);
  color: white;
}

.container { max-width: 1000px; margin: auto; padding: 15px; }

h1 { text-align: center; font-size: 40px; }
.subtitle { text-align: center; font-style: italic; margin-bottom: 10px; }

.sticker {
  position: absolute;
  top: 20px;
  right: -40px;
  background: #facc15;
  color: black;
  padding: 10px 60px;
  transform: rotate(20deg);
  font-weight: bold;
}

.wrapper { position: relative; }

.address { text-align:center; font-size:18px; margin-bottom:10px; }

.live { text-align:center; margin-bottom:10px; font-size:14px; opacity:0.9; }

.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:8px;
}

.gallery img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 12px;
  border-radius: 12px;
  margin-top: 12px;
}

/* SUPPLEMENTS COLUMN */
.supp-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

input, button {
  padding: 8px;
  border-radius: 8px;
  border: none;
  width: 100%;
  margin-top:6px;
}

button { background:#e11d48; color:white; cursor:pointer; }

.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:4px;
  font-size:12px;
}

.day { padding:6px; text-align:center; border-radius:6px; }
.free { background:#16a34a; }
.booked { background:#991b1b; }

/* FLOATING PRICE ANIMATION */
.floating {
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%);
  background: black;
  padding: 10px 15px;
  border-radius: 10px;
  opacity: 0;
  animation: pop 1.2s ease forwards;
  pointer-events:none;
  font-weight:bold;
}

@keyframes pop {
  0% { opacity:0; transform:translateX(-50%) translateY(20px); }
  30% { opacity:1; }
  100% { opacity:0; transform:translateX(-50%) translateY(-40px); }
}

.small-note{
  font-size:10px;
  opacity:0.6;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="wrapper">
  <div class="sticker">À partir de 150€ la nuit</div>

  <h1>La Foufounette 💋</h1>
  <p class="subtitle">Expérience immersive 😏</p>

  <div class="address"><strong>35 rue Robert Gaillard, Châtellerault</strong></div>
  <div class="live">🔥 <span id="viewers">3</span> personnes regardent</div>
</div>

<div class="gallery">
  <img src="exterieur.jpg">
  <img src="https://image.pollinations.ai/prompt/romantic%20vaulted%20cellar%20jacuzzi">
  <img src="https://image.pollinations.ai/prompt/luxury%20loveroom%20neon">
</div>

<div class="card">
  <h2>Suppléments (+50€)</h2>
  <div class="supp-list">
    <label><input type="checkbox" class="supp"> NazOpanier</label>
    <label><input type="checkbox" class="supp"> Macaron de Montmorillon</label>
    <label><input type="checkbox" class="supp"> JP</label>
    <label><input type="checkbox" class="supp"> Sophie</label>
    <label><input type="checkbox" class="supp"> Pierre</label>
    <label><input type="checkbox" class="supp"> Maxence</label>
  </div>
</div>

<div class="card">
  <h2>Réservation</h2>
  <input type="date" id="in">
  <input type="date" id="out">
  <p id="total">Total : 150€</p>
  <button onclick="calcTotal()">Accéder au paiement</button>
</div>

<div class="card" id="payment" style="display:none;">
  <h2>Paiement</h2>
  <input placeholder="Nom">
  <input placeholder="Carte">
  <input placeholder="Exp">
  <input placeholder="CVV">
  <button onclick="fakePay()">Valider</button>
</div>

<div class="card">
  <h2>Calendrier</h2>
  <div class="calendar" id="calendar"></div>
</div>

<div class="card">
  <h2>Le Levrette Café</h2>
  <p>Pour prolonger l'expérience.</p>
</div>

</div>

<script>
let base = 150;

function showFloat(text){
  const f=document.createElement('div');
  f.className='floating';
  f.innerText=text;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1200);
}

function calcTotal(){
  let supp = document.querySelectorAll('.supp:checked').length * 50;
  let total = base + supp;
  document.getElementById('total').innerText="Total : "+total+"€";
  document.getElementById('payment').style.display='block';
}

// +50 / -50 animation
const supps=document.querySelectorAll('.supp');

supps.forEach(s=>{
  s.addEventListener('change',()=>{
    if(s.checked){
      showFloat("+50€");
    }else{
      showFloat("-50€");
    }
    let count=document.querySelectorAll('.supp:checked').length;
    document.getElementById('total').innerText="Total : "+(150+count*50)+"€";
  });
});

// fake calendar
const booked=[3,4,10,11,18,19,25];
const cal=document.getElementById('calendar');
for(let i=1;i<=30;i++){
  let d=document.createElement('div');
  d.className='day';
  d.innerText=i;
  d.classList.add(booked.includes(i)?'booked':'free');
  cal.appendChild(d);
}

// viewers
document.getElementById('viewers').innerText=Math.floor(Math.random()*5)+3;

</script>

</body>
</html>
