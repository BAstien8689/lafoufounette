<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Le détroit d'Ormuz est-il ouvert ?</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2b2b3d);
        color: #fff;
        text-align: center;
    }

    .card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        padding: 50px;
        border-radius: 20px;
        width: 90%;
        max-width: 600px;
        margin: 100px auto;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h1 {
        margin-bottom: 30px;
    }

    button {
        padding: 15px 30px;
        font-size: 1.2em;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, #ff4d4d, #ff9900);
        color: white;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    #thinking {
        margin-top: 25px;
        font-style: italic;
        color: #bbb;
        height: 30px;
    }

    #result {
        margin-top: 40px;
        font-size: 2.5em;
        font-weight: bold;
    }

    #sub {
        margin-top: 10px;
        color: #ccc;
        font-style: italic;
    }

    /* ALERTE */
    #corner {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 20px;
        border-radius: 15px;
        font-size: 1.1em;
        max-width: 320px;
        display: none;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        animation: pop 0.3s ease;
        color: white;
    }

    @keyframes pop {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .alert-red {
        background: #e53935;
    }

    .alert-green {
        background: #43a047;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Le détroit d'Ormuz est-il ouvert ?</h1>

    <button onclick="checkStatus()">Maintenant ?</button>

    <div id="thinking"></div>
    <div id="result"></div>
    <div id="sub"></div>
</div>

<div id="corner"></div>

<script>
const thinkingPhrases = [
    "Analyse des courants maritimes approximatifs...",
    "Nos experts regardent de près… mais pas trop...",
    "Consultation du neurone de Donald Trump...",
    "Lecture de cartes à moitié comprises...",
    "Simulation d’experts pas d’accord...",
    "Observation intense de quelque chose...",
    "Connexion à une source probablement fiable...",
    "Réflexion profonde (ou pas)..."
];

const mainAnswers = [
    "On ne sait pas.",
    "Impossible à confirmer.",
    "C’est incertain.",
    "Les infos sont floues.",
    "Aucune certitude.",
    "Difficile à dire.",
    "La situation est ambiguë.",
    "Peut-être. Peut-être pas."
];

const subTexts = [
    "Les données ne convergent pas.",
    "Certains disent oui. D'autres… non.",
    "Tout dépend du point de vue.",
    "Les experts hésitent aussi.",
    "Ça bouge, mais dans quel sens ?"
];

const alertMessages = [
    "🚨 BREAKING: CRISE MONDIALE IMMINENTE",
    "🚨 ALERTE: situation critique détectée",
    "🚨 URGENT: mouvement suspect observé",
    "🚨 DERNIÈRE MINUTE: tension maximale"
];

const calmBack = [
    "On s’est emballé trop vite.",
    "C’était juste une fusée.",
    "Fausse alerte finalement.",
    "On a cru à un truc.",
    "Rien de grave en fait.",
    "On a peut-être exagéré."
];

function checkStatus() {
    const thinking = document.getElementById("thinking");
    const result = document.getElementById("result");
    const sub = document.getElementById("sub");
    const corner = document.getElementById("corner");

    result.innerHTML = "";
    sub.innerHTML = "";
    corner.style.display = "none";

    thinking.innerHTML = thinkingPhrases[Math.floor(Math.random() * thinkingPhrases.length)];

    setTimeout(() => {
        thinking.innerHTML = "";

        result.innerHTML = mainAnswers[Math.floor(Math.random() * mainAnswers.length)];
        sub.innerHTML = subTexts[Math.floor(Math.random() * subTexts.length)];

        // 40% chance d'alerte
        if (Math.random() < 0.4) {
            corner.className = "alert-red";
            corner.innerHTML = alertMessages[Math.floor(Math.random() * alertMessages.length)];
            corner.style.display = "block";

            setTimeout(() => {
                corner.className = "alert-green";
                corner.innerHTML += "<br><br>" + calmBack[Math.floor(Math.random() * calmBack.length)];
            }, 2000);
        }

    }, 1200);
}
</script>

</body>
</html>
