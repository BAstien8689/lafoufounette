<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le détroit d'Ormuz est-il ouvert ?</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: radial-gradient(circle at center, #0a0f1a, #02040a);
    color: #00ff9c;
}

/* container */
.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

/* panel */
.panel {
    background: rgba(0, 20, 10, 0.85);
    border: 1px solid #00ff9c22;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 0 30px #00ff9c22;
}

/* titres */
.title {
    text-align: center;
    font-size: 1.5em;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 0.8em;
    opacity: 0.5;
    margin-bottom: 25px;
}

/* bouton */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(45deg, #003322, #001a10);
    color: #00ff9c;
    border: 1px solid #00ff9c44;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 0 10px #00ff9c44;
}

/* thinking */
#thinking {
    margin-top: 20px;
    font-size: 0.85em;
    opacity: 0.8;
    min-height: 20px;
}

/* progress */
.progress {
    height: 6px;
    background: #001a10;
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff9c, #00cfff);
    box-shadow: 0 0 10px #00ff9c;
    transition: width 0.15s linear;
}

/* résultat */
#result {
    margin-top: 25px;
    font-size: 1.7em;
}

#sub {
    margin-top: 10px;
    font-size: 0.85em;
    opacity: 0.7;
}

/* alerte */
#alert {
    position: fixed;
    bottom: 15px;
    left: 15px;
    right: 15px;
    max-width: 400px;
    margin: auto;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

.red {
    color: #ff6b6b;
    border: 1px solid #ff6b6b;
    background: rgba(80,0,0,0.9);
}

.green {
    color: #00ff9c;
    border: 1px solid #00ff9c;
    background: rgba(0,40,20,0.9);
}

/* popup */
#popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,20,10,0.95);
    border: 1px solid #00ff9c33;
    padding: 15px;
    border-radius: 10px;
    display: none;
    max-width: 250px;
    font-size: 0.8em;
}

#popup button {
    margin-top: 10px;
    font-size: 0.75em;
}

/* responsive */
@media (max-width: 500px) {
    .title { font-size: 1.2em; }
    #result { font-size: 1.3em; }
}
</style>
</head>

<body>

<div class="container">
    <div class="panel">

        <div class="title">Le détroit d'Ormuz est-il ouvert ?</div>
        <div class="subtitle">ORBITAL MONITOR</div>

        <button onclick="scan()">Et maintenant ?</button>

        <div id="thinking"></div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div id="result"></div>
        <div id="sub"></div>

    </div>
</div>

<div id="alert"></div>

<div id="popup">
    <div id="popupText"></div>
    <button onclick="closePopup()">ignorer</button>
</div>

<script>
const thinking = [
    "Analyse satellite en cours...",
    "Nos experts regardent… vaguement...",
    "Analyse des signaux de fumée...",
    "Recherche dans la cavité cervicale de Donald Trump...",
    "Croisement de données contradictoires...",
    "Scan radar approximatif..."
];

const answers = [
    "On ne sait pas.",
    "Peut-être bien que oui.",
    "Peut-être bien que non.",
    "Oui… enfin non.",
    "Ni ouvert. Ni fermé.",
    "C’est flou."
];

const sub = [
    "Les données ne convergent pas.",
    "Les experts hésitent.",
    "On observe sans comprendre.",
    "Situation ambiguë."
];

const alerts = [
    "🚨 activité inhabituelle détectée",
    "🚨 mouvement suspect",
    "🚨 tension en hausse"
];

const calm = [
    "On s’est emballé.",
    "C’était une fusée.",
    "Fausse alerte."
];

const popupTexts = [
    "T’as pas autre chose à faire ?",
    "Encore là ?",
    "Ça t’obsède un peu non ?"
];

function scan() {
    const t = document.getElementById("thinking");
    const r = document.getElementById("result");
    const s = document.getElementById("sub");
    const b = document.getElementById("bar");
    const a = document.getElementById("alert");

    r.innerHTML = "";
    s.innerHTML = "";
    a.style.display = "none";
    b.style.width = "0%";

    t.innerHTML = thinking[Math.floor(Math.random()*thinking.length)];

    let p = 0;

    const interval = setInterval(() => {
        p += 12; // plus rapide
        b.style.width = p + "%";

        if (p >= 100) {
            clearInterval(interval);
            t.innerHTML = "";

            r.innerHTML = answers[Math.floor(Math.random()*answers.length)];
            s.innerHTML = sub[Math.floor(Math.random()*sub.length)];

            if (Math.random() < 0.3) {
                a.className = "red";
                a.innerHTML = alerts[Math.floor(Math.random()*alerts.length)];
                a.style.display = "block";

                setTimeout(() => {
                    a.className = "green";
                    a.innerHTML += "<br>" + calm[Math.floor(Math.random()*calm.length)];
                }, 2000);
            }

            if (Math.random() < 0.25) showPopup();
        }
    }, 150); // plus fluide
}

function showPopup() {
    const popup = document.getElementById("popup");
    const text = document.getElementById("popupText");
    text.innerHTML = popupTexts[Math.floor(Math.random()*popupTexts.length)];
    popup.style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
