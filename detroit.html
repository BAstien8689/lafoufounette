<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Le détroit d'Ormuz est-il ouvert ?</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #222;
        text-align: center;
        padding-top: 100px;
    }

    h1 {
        font-size: 2em;
        margin-bottom: 30px;
    }

    button {
        padding: 15px 30px;
        font-size: 1.2em;
        background: #222;
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 6px;
    }

    button:hover {
        background: #444;
    }

    #thinking {
        margin-top: 30px;
        font-style: italic;
        color: #777;
        height: 30px;
    }

    #result {
        margin-top: 40px;
        font-size: 2.5em;
        font-weight: bold;
        min-height: 80px;
    }

    #sub {
        margin-top: 10px;
        color: #666;
        font-style: italic;
    }

    /* GROS encart coin */
    #corner {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 20px;
        border-radius: 12px;
        font-size: 1.1em;
        max-width: 300px;
        display: none;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
        animation: pop 0.3s ease;
    }

    @keyframes pop {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .breaking {
        background: red;
        color: white;
    }

    .promo {
        background: #ff9800;
        color: white;
    }

    .info {
        background: #2196f3;
        color: white;
    }
</style>
</head>
<body>

<h1>Le détroit d'Ormuz est-il ouvert ?</h1>

<button onclick="checkStatus()">Maintenant ?</button>

<div id="thinking"></div>
<div id="result"></div>
<div id="sub"></div>

<div id="corner"></div>

<script>
const thinkingPhrases = [
    "Analyse des courants maritimes approximatifs...",
    "Nos experts regardent de près… mais pas trop...",
    "Consultation du neurone de Donald Trump...",
    "Lecture de cartes à moitié comprises...",
    "Simulation d’experts pas d’accord entre eux...",
    "Observation intense de quelque chose...",
    "Analyse stratégique très floue...",
    "Connexion à une source probablement fiable...",
    "Réflexion profonde (ou pas)...",
    "Croisement de données douteuses..."
];

const mainAnswers = [
    "On ne sait pas.",
    "Impossible à confirmer.",
    "C’est incertain.",
    "Les infos sont floues.",
    "Aucune certitude.",
    "Difficile à dire.",
    "On préfère ne pas conclure.",
    "La situation est ambiguë.",
    "Peut-être. Peut-être pas.",
    "Rien de clair pour l’instant."
];

const subTexts = [
    "Les données ne convergent pas.",
    "Certains disent oui. D'autres… non.",
    "Tout dépend du point de vue.",
    "On observe sans comprendre.",
    "Les experts hésitent aussi.",
    "Ça bouge, mais dans quel sens ?",
    "Rien n’est totalement fermé. Ni ouvert."
];

const cornerMessages = [
    { type: "breaking", text: "🚨 BREAKING: CRISE MONDIALE IMMINENTE" },
    { type: "breaking", text: "🚨 ALERTE: situation critique détectée" },
    { type: "info", text: "📡 ANALYSE: activité inhabituelle observée" },
    { type: "promo", text: "🔥 PROMO: panique générale activée" }
];

const calmBack = [
    "On s’est emballé trop vite.",
    "On a cru à un truc.",
    "C’était juste une fusée.",
    "Fausse alerte finalement.",
    "Rien de grave en fait.",
    "Mauvaise interprétation.",
    "On a peut-être exagéré.",
    "Tout va bien… probablement."
];

function checkStatus() {
    const thinking = document.getElementById("thinking");
    const result = document.getElementById("result");
    const sub = document.getElementById("sub");
    const corner = document.getElementById("corner");

    result.innerHTML = "";
    sub.innerHTML = "";
    corner.style.display = "none";

    thinking.innerHTML = thinkingPhrases[Math.floor(Math.random() * thinkingPhrases.length)];

    setTimeout(() => {
        thinking.innerHTML = "";

        result.innerHTML = mainAnswers[Math.floor(Math.random() * mainAnswers.length)];
        sub.innerHTML = subTexts[Math.floor(Math.random() * subTexts.length)];

        // 40% de chance d'alerte
        if (Math.random() < 0.4) {
            const msg = cornerMessages[Math.floor(Math.random() * cornerMessages.length)];

            corner.className = msg.type;
            corner.innerHTML = msg.text;
            corner.style.display = "block";

            setTimeout(() => {
                corner.innerHTML += "<br><br>" + calmBack[Math.floor(Math.random() * calmBack.length)];
            }, 2000);
        }

    }, 1200);
}
</script>

</body>
</html>
