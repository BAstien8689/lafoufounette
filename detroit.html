<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le détroit d'Ormuz est-il ouvert ?</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: radial-gradient(circle at center, #0a0f1a, #02040a);
    color: #00ff9c;
}

/* container */
.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

/* panel */
.panel {
    background: rgba(0, 20, 10, 0.9);
    border: 1px solid #00ff9c33;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 0 25px #00ff9c22;
}

/* titres */
.title {
    text-align: center;
    font-size: 1.4em;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    font-size: 0.8em;
    opacity: 0.6;
    margin-bottom: 20px;
}

/* bouton */
button {
    width: 100%;
    padding: 15px;
    background: #001a10;
    color: #00ff9c;
    border: 1px solid #00ff9c55;
    cursor: pointer;
}

button:hover {
    background: #003322;
}

/* thinking */
#thinking {
    margin-top: 20px;
    font-size: 0.9em;
    opacity: 0.8;
}

/* progress */
.progress {
    height: 8px;
    background: #001a10;
    margin-top: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #00ff9c;
}

/* result */
#result {
    margin-top: 25px;
    font-size: 1.8em;
}

#sub {
    margin-top: 10px;
    font-size: 0.9em;
    opacity: 0.7;
}

/* alert */
#alert {
    position: fixed;
    bottom: 15px;
    left: 15px;
    right: 15px;
    max-width: 400px;
    margin: auto;
    padding: 15px;
    border: 1px solid;
    display: none;
}

.red {
    color: red;
    border-color: red;
    background: rgba(50,0,0,0.9);
}

.green {
    color: #00ff9c;
    border-color: #00ff9c;
    background: rgba(0,40,20,0.9);
}

/* popup */
#popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #001a10;
    border: 1px solid #00ff9c55;
    padding: 15px;
    display: none;
    max-width: 250px;
    font-size: 0.85em;
}

#popup button {
    margin-top: 10px;
    font-size: 0.8em;
}

/* responsive */
@media (max-width: 500px) {
    .title { font-size: 1.1em; }
    #result { font-size: 1.4em; }
}
</style>
</head>

<body>

<div class="container">
    <div class="panel">

        <div class="title">Le détroit d'Ormuz est-il ouvert ?</div>
        <div class="subtitle">ORBITAL MONITOR // ACCÈS RESTREINT</div>

        <button onclick="scan()">Et maintenant ?</button>

        <div id="thinking"></div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div id="result"></div>
        <div id="sub"></div>

    </div>
</div>

<div id="alert"></div>

<div id="popup">
    <div id="popupText"></div>
    <button onclick="closePopup()">ignorer</button>
</div>

<script>
const thinking = [
    "Analyse satellite en cours...",
    "Nos experts regardent de près… mais pas trop...",
    "Analyse des signaux de fumée...",
    "Recherche dans la cavité cervicale de Donald Trump : trop de résonance à cause du vide...",
    "Croisement de données contradictoires...",
    "Scan radar basse précision...",
    "Observation d’un point suspect...",
    "Simulation d’experts pas d’accord...",
    "Analyse quantique approximative...",
    "Lecture de données incompréhensibles..."
];

const answers = [
    "On ne sait pas.",
    "Peut-être bien que oui.",
    "Peut-être bien que non.",
    "Oui… enfin non.",
    "Ni ouvert. Ni fermé.",
    "Ça dépend.",
    "On hésite.",
    "C’est flou.",
    "Un peu des deux.",
    "Globalement incertain."
];

const sub = [
    "Les données ne convergent pas.",
    "Les experts hésitent.",
    "Certains disent oui. D'autres non.",
    "On observe sans comprendre.",
    "Les signaux sont contradictoires."
];

const alerts = [
    "🚨 ALERTE: activité inhabituelle détectée",
    "🚨 BREAKING: mouvement suspect observé",
    "🚨 FLASH: tension en hausse"
];

const calm = [
    "On s’est emballé trop vite.",
    "C’était juste une fusée.",
    "Fausse alerte finalement.",
    "Rien de grave en fait."
];

const popupTexts = [
    "Vous êtes sûr de ne pas avoir autre chose à faire ?",
    "Surveiller le détroit… encore ?",
    "Peut-être prendre une pause ?",
    "C’est important pour vous ça ?",
    "Personne ne vous regarde, vous pouvez arrêter."
];

function scan() {
    const t = document.getElementById("thinking");
    const r = document.getElementById("result");
    const s = document.getElementById("sub");
    const b = document.getElementById("bar");
    const a = document.getElementById("alert");

    r.innerHTML = "";
    s.innerHTML = "";
    a.style.display = "none";
    b.style.width = "0%";

    t.innerHTML = thinking[Math.floor(Math.random()*thinking.length)];

    let p = 0;

    const interval = setInterval(() => {
        p += Math.random() * 5;
        b.style.width = p + "%";

        if (p >= 100) {
            clearInterval(interval);
            t.innerHTML = "";

            r.innerHTML = answers[Math.floor(Math.random()*answers.length)];
            s.innerHTML = sub[Math.floor(Math.random()*sub.length)];

            if (Math.random() < 0.3) {
                a.className = "red";
                a.innerHTML = alerts[Math.floor(Math.random()*alerts.length)];
                a.style.display = "block";

                setTimeout(() => {
                    a.className = "green";
                    a.innerHTML += "<br>" + calm[Math.floor(Math.random()*calm.length)];
                }, 2500);
            }

            // popup aléatoire
            if (Math.random() < 0.25) {
                showPopup();
            }
        }
    }, 200);
}

function showPopup() {
    const popup = document.getElementById("popup");
    const text = document.getElementById("popupText");

    text.innerHTML = popupTexts[Math.floor(Math.random()*popupTexts.length)];
    popup.style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
