<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Le détroit d'Ormuz est-il ouvert ?</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa") no-repeat center/cover;
}

/* overlay sombre */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

/* carte centrale */
.card {
    position: relative;
    margin: 80px auto;
    padding: 40px;
    width: 90%;
    max-width: 600px;
    background: rgba(20,20,30,0.85);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* bouton */
button {
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    margin-top: 20px;
}

button:hover {
    transform: scale(1.05);
}

/* réflexion */
#thinking {
    margin-top: 25px;
    font-style: italic;
    color: #ccc;
    height: 30px;
}

/* barre */
#progress {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

#bar {
    height: 100%;
    width: 0%;
    background: #00c6ff;
    transition: width 0.2s;
}

/* résultat */
#result {
    margin-top: 40px;
    font-size: 2.4em;
    font-weight: bold;
}

#sub {
    margin-top: 10px;
    color: #aaa;
}

/* alerte */
#corner {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 20px;
    border-radius: 15px;
    max-width: 300px;
    display: none;
    font-size: 1em;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

.alert-red {
    background: #e53935;
}

.alert-green {
    background: #43a047;
}
</style>
</head>

<body>

<div class="card">
    <h1>Le détroit d'Ormuz est-il ouvert ?</h1>

    <button onclick="checkStatus()">Maintenant ?</button>

    <div id="thinking"></div>

    <div id="progress">
        <div id="bar"></div>
    </div>

    <div id="result"></div>
    <div id="sub"></div>
</div>

<div id="corner"></div>

<script>
const thinkingPhrases = [
    "Analyse satellite en cours...",
    "Nos experts regardent de près… mais pas trop...",
    "Lecture des flux maritimes invisibles...",
    "Connexion à une source douteusement fiable...",
    "Analyse du neurone de Donald Trump...",
    "Croisement de données contradictoires...",
    "Observation d’un point sur la carte...",
    "Simulation d’experts fatigués..."
];

const mainAnswers = [
    "On ne sait pas.",
    "Impossible à confirmer.",
    "C’est incertain.",
    "Les infos sont floues.",
    "Aucune certitude.",
    "Difficile à dire.",
    "Peut-être. Peut-être pas.",
    "Rien de clair."
];

const subTexts = [
    "Les données ne convergent pas.",
    "Les experts hésitent.",
    "Certains disent oui. D'autres non.",
    "La situation évolue.",
    "On observe sans comprendre."
];

const alertMessages = [
    "🚨 BREAKING: activité inhabituelle détectée",
    "🚨 ALERTE: mouvement suspect repéré",
    "🚨 URGENT: tension en hausse",
    "🚨 INFO: situation instable",
    "🚨 FLASH: possible incident"
];

const calmBack = [
    "On s’est emballé trop vite.",
    "C’était juste une fusée.",
    "Fausse alerte.",
    "On a cru à un truc.",
    "Rien de grave finalement.",
    "Erreur d’interprétation."
];

function checkStatus() {
    const thinking = document.getElementById("thinking");
    const result = document.getElementById("result");
    const sub = document.getElementById("sub");
    const bar = document.getElementById("bar");
    const corner = document.getElementById("corner");

    result.innerHTML = "";
    sub.innerHTML = "";
    corner.style.display = "none";
    bar.style.width = "0%";

    thinking.innerHTML = thinkingPhrases[Math.floor(Math.random() * thinkingPhrases.length)];

    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 8;
        bar.style.width = progress + "%";

        if (progress >= 100) {
            clearInterval(interval);

            thinking.innerHTML = "";

            result.innerHTML = mainAnswers[Math.floor(Math.random() * mainAnswers.length)];
            sub.innerHTML = subTexts[Math.floor(Math.random() * subTexts.length)];

            // 30% chance d'alerte
            if (Math.random() < 0.3) {
                corner.className = "alert-red";
                corner.innerHTML = alertMessages[Math.floor(Math.random() * alertMessages.length)];
                corner.style.display = "block";

                setTimeout(() => {
                    corner.className = "alert-green";
                    corner.innerHTML += "<br><br>" + calmBack[Math.floor(Math.random() * calmBack.length)];
                }, 2500);
            }
        }
    }, 200);
}
</script>

</body>
</html>
