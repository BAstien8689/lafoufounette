<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Le détroit d'Ormuz est-il ouvert ?</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
        text-align: center;
        padding-top: 100px;
    }

    h1 {
        font-size: 2em;
        margin-bottom: 40px;
    }

    button {
        padding: 15px 30px;
        font-size: 1.2em;
        background: #222;
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 6px;
    }

    button:hover {
        background: #444;
    }

    #result {
        margin-top: 60px;
        font-size: 2.5em;
        font-weight: bold;
        min-height: 80px;
    }

    #sub {
        margin-top: 15px;
        color: #666;
        font-style: italic;
    }

    /* Coin breaking */
    #corner {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 15px;
        border-radius: 10px;
        font-size: 0.9em;
        max-width: 250px;
        display: none;
    }

    .breaking {
        background: red;
        color: white;
    }

    .promo {
        background: #ff9800;
        color: white;
    }

    .info {
        background: #2196f3;
        color: white;
    }
</style>
</head>
<body>

<h1>Le détroit d'Ormuz est-il ouvert ?</h1>

<button onclick="checkStatus()">Maintenant ?</button>

<div id="result"></div>
<div id="sub"></div>

<div id="corner"></div>

<script>
const mainAnswers = [
    "On ne sait pas.",
    "Impossible à confirmer.",
    "C’est… incertain.",
    "Les informations sont floues.",
    "Rien de vraiment clair.",
    "On manque de certitudes.",
    "Difficile à dire.",
    "Les signaux sont contradictoires.",
    "Aucune conclusion fiable.",
    "C’est en cours d’évaluation.",
    "Peut-être. Ou pas.",
    "On préfère ne pas trancher.",
    "La situation reste ambiguë.",
    "On ne peut pas affirmer."
];

const subTexts = [
    "Les données ne convergent pas.",
    "Certaines sources disent oui. D'autres… autre chose.",
    "Tout dépend du point de vue.",
    "La situation évolue constamment.",
    "On surveille, sans comprendre.",
    "Il y a du mouvement, mais lequel ?",
    "Rien n’est totalement fermé. Ni ouvert.",
    "Les experts hésitent aussi."
];

const cornerMessages = [
    { type: "breaking", text: "BREAKING: Crise mondiale imminente !" },
    { type: "breaking", text: "ALERTE: Situation critique détectée !" },
    { type: "promo", text: "Promo: -0% sur l’inquiétude globale" },
    { type: "promo", text: "Offre spéciale: panique gratuite" },
    { type: "info", text: "Info: Tout pourrait basculer. Ou pas." },
    { type: "info", text: "Analyse: rien de certain n’est sûr" }
];

const calmBack = [
    "…ah non.",
    "…fausse alerte.",
    "…pas maintenant.",
    "…on s’est peut-être trompé.",
    "…finalement non."
];

function checkStatus() {
    const result = document.getElementById("result");
    const sub = document.getElementById("sub");
    const corner = document.getElementById("corner");

    // Réponse principale (toujours floue)
    result.innerHTML = mainAnswers[Math.floor(Math.random() * mainAnswers.length)];
    sub.innerHTML = subTexts[Math.floor(Math.random() * subTexts.length)];

    // Reset corner
    corner.style.display = "none";

    // 1 chance sur 5 d’avoir un délire
    if (Math.random() < 0.2) {
        const msg = cornerMessages[Math.floor(Math.random() * cornerMessages.length)];

        corner.className = msg.type;
        corner.innerHTML = msg.text;
        corner.style.display = "block";

        // retournement après 2 sec
        setTimeout(() => {
            corner.innerHTML += "<br>" + calmBack[Math.floor(Math.random() * calmBack.length)];
        }, 2000);
    }
}
</script>

</body>
</html>
