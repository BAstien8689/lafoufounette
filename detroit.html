<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITAL MONITOR</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: radial-gradient(circle at center, #0a0f1a, #03060d);
    color: #00ff9c;
}

/* container */
.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

/* panneau */
.panel {
    background: rgba(0, 20, 10, 0.8);
    border: 1px solid #00ff9c33;
    border-radius: 10px;
    padding: 25px;
    box-shadow: 0 0 20px #00ff9c22;
}

/* titre */
h1 {
    font-size: 1.4em;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

/* bouton */
button {
    width: 100%;
    padding: 15px;
    background: #001a10;
    color: #00ff9c;
    border: 1px solid #00ff9c55;
    cursor: pointer;
    font-size: 1em;
}

button:hover {
    background: #003322;
}

/* réflexion */
#thinking {
    margin-top: 20px;
    font-size: 0.9em;
    opacity: 0.8;
}

/* barre */
.progress {
    width: 100%;
    height: 8px;
    background: #001a10;
    margin-top: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #00ff9c;
    transition: width 0.2s;
}

/* résultat */
#result {
    margin-top: 25px;
    font-size: 1.8em;
}

#sub {
    margin-top: 10px;
    font-size: 0.9em;
    opacity: 0.7;
}

/* alerte */
#alert {
    position: fixed;
    bottom: 10px;
    left: 10px;
    right: 10px;
    max-width: 400px;
    margin: auto;
    padding: 15px;
    border: 1px solid;
    display: none;
    font-size: 0.9em;
}

.red {
    border-color: red;
    color: red;
    background: rgba(50,0,0,0.8);
}

.green {
    border-color: #00ff9c;
    color: #00ff9c;
    background: rgba(0,40,20,0.9);
}

/* responsive */
@media (max-width: 500px) {
    h1 {
        font-size: 1.1em;
    }

    #result {
        font-size: 1.4em;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="panel">
        <h1>[ ORBITAL MONITOR // STRAIT STATUS ]</h1>

        <button onclick="scan()">INIT SCAN</button>

        <div id="thinking"></div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div id="result"></div>
        <div id="sub"></div>
    </div>
</div>

<div id="alert"></div>

<script>
const thinking = [
    "Satellite uplink en cours...",
    "Analyse thermique des eaux...",
    "Nos experts regardent de près… mais pas trop...",
    "Décodage de signaux contradictoires...",
    "Consultation du neurone de Donald Trump...",
    "Scan radar basse précision...",
    "Croisement de sources douteuses..."
];

const answers = [
    "STATUT INCONNU",
    "DONNÉES INSUFFISANTES",
    "IMPOSSIBLE À CONFIRMER",
    "INCERTITUDE GLOBALE",
    "AUCUNE CONCLUSION",
    "SIGNAL AMBIGU"
];

const sub = [
    "Les flux restent difficiles à interpréter.",
    "Activité détectée sans explication.",
    "Les données ne convergent pas.",
    "Observation en cours.",
    "Analyse non concluante."
];

const alerts = [
    "⚠️ ALERTE: activité inhabituelle détectée",
    "⚠️ SIGNAL: mouvement suspect",
    "⚠️ FLASH: variation critique",
    "⚠️ ANOMALIE détectée"
];

const calm = [
    "Correction: on s’est emballé.",
    "Analyse révisée: rien de confirmé.",
    "C’était probablement une fusée.",
    "Fausse alerte.",
    "Interprétation erronée."
];

function scan() {
    const t = document.getElementById("thinking");
    const r = document.getElementById("result");
    const s = document.getElementById("sub");
    const b = document.getElementById("bar");
    const a = document.getElementById("alert");

    r.innerHTML = "";
    s.innerHTML = "";
    a.style.display = "none";
    b.style.width = "0%";

    t.innerHTML = thinking[Math.floor(Math.random()*thinking.length)];

    let p = 0;

    const interval = setInterval(() => {
        p += Math.random() * 6;
        b.style.width = p + "%";

        if (p >= 100) {
            clearInterval(interval);
            t.innerHTML = "";

            r.innerHTML = answers[Math.floor(Math.random()*answers.length)];
            s.innerHTML = sub[Math.floor(Math.random()*sub.length)];

            if (Math.random() < 0.3) {
                a.className = "red";
                a.innerHTML = alerts[Math.floor(Math.random()*alerts.length)];
                a.style.display = "block";

                setTimeout(() => {
                    a.className = "green";
                    a.innerHTML += "<br>" + calm[Math.floor(Math.random()*calm.length)];
                }, 2500);
            }
        }
    }, 200);
}
</script>

</body>
</html>
